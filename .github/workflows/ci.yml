# GitHub Actions - Builds and pushes Docker images
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Docker Hub login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build backend image
      - name: Build backend
        run: |
          docker build -t sarimrasheed/microservice-backend:${{ github.sha }} ./app/backend
          docker tag sarimrasheed/microservice-backend:${{ github.sha }} sarimrasheed/microservice-backend:latest

      # Build frontend image
      - name: Build frontend
        run: |
          docker build -t sarimrasheed/microservice-frontend:${{ github.sha }} ./app/frontend
          docker tag sarimrasheed/microservice-frontend:${{ github.sha }} sarimrasheed/microservice-frontend:latest

      # Push images to Docker Hub
      - name: Push images
        run: |
          docker push sarimrasheed/microservice-backend:${{ github.sha }}
          docker push sarimrasheed/microservice-backend:latest
          docker push sarimrasheed/microservice-frontend:${{ github.sha }}
          docker push sarimrasheed/microservice-frontend:latest

      # Update K8s manifests with new image tags
      - name: Update manifests
        run: |
          sed -i "s|sarimrasheed/microservice-backend:.*|sarimrasheed/microservice-backend:${{ github.sha }}|g" kubernetes/manifests/backend-deployment.yaml
          sed -i "s|sarimrasheed/microservice-frontend:.*|sarimrasheed/microservice-frontend:${{ github.sha }}|g" kubernetes/manifests/frontend-deployment.yaml

      # Commit updated manifests
      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add kubernetes/manifests/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update image tags to ${{ github.sha }}"
          git push